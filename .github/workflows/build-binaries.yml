name: Build AmneziaWG Binaries

on:
  workflow_dispatch:
    inputs:
      debug:
        description: 'Enable debug output'
        required: false
        default: 'false'
        type: choice
        options:
          - 'true'
          - 'false'
  pull_request:
    paths:
      - '.github/workflows/build-binaries.yml'
      - 'infra/**'
jobs:
  build-binaries:
    name: Build AmneziaWG binaries for SteamOS (Steam Deck)
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/mrwaip/vpn-deck-builder:latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Copy binaries from container
        run: |
          mkdir -p binaries
          cp -a /binaries/. binaries/

      - name: Create binaries archive
        run: |
          tar -czf amneziawg-binaries-steamos-amd64.tar.gz -C binaries .
          tar -tzf amneziawg-binaries-steamos-amd64.tar.gz
          ls -lh amneziawg-binaries-steamos-amd64.tar.gz

      - name: Upload binaries as artifact
        uses: actions/upload-artifact@v4
        with:
          name: amneziawg-binaries-steamos-amd64
          path: amneziawg-binaries-steamos-amd64.tar.gz
          retention-days: 90
